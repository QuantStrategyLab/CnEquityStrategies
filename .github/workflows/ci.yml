name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve QuantPlatformKit ref
        id: quant-platform-kit-ref
        run: |
          set -euo pipefail
          ref="main"
          if [ -n "${GITHUB_HEAD_REF:-}" ]; then
            case "${GITHUB_HEAD_REF}" in
              dependabot/*)
                ;;
              *)
                if git ls-remote --exit-code --heads https://github.com/QuantStrategyLab/QuantPlatformKit.git "${GITHUB_HEAD_REF}" >/dev/null 2>&1; then
                  ref="${GITHUB_HEAD_REF}"
                fi
                ;;
            esac
          fi
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"

      - name: Checkout QuantPlatformKit
        uses: actions/checkout@v6
        with:
          repository: QuantStrategyLab/QuantPlatformKit
          ref: ${{ steps.quant-platform-kit-ref.outputs.ref }}
          path: external/QuantPlatformKit

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e . pandas pytest pytest-cov ruff build
          python -m pip install --no-deps -e external/QuantPlatformKit

      - name: Verify dependencies
        run: |
          set -euo pipefail
          python -m pip check

      - name: Run Ruff
        run: |
          set -euo pipefail
          ruff check --exclude external .

      - name: Run unit tests
        run: |
          set -euo pipefail
          PYTHONPATH=src python -m pytest -q tests --cov --cov-report=term --cov-report=xml

      - name: Build package
        run: |
          set -euo pipefail
          python -m build
